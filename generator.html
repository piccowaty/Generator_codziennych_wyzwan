<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator codziennych wyzwań</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
    <header>
        <h2>Generator codziennych wyzwań</h2>
    </header>
    <main>
        <aside class="lewy_aside"> 
            <div class="do_zrobienia">
                <p>Wylosowane</p>
            </div>
            <div class="wykonane">
                <p>Wykonane</p>
            </div>
        </aside>
        <section class="losowanie">
            <h3>Wylosuj wyzwanie</h3>
        </section>
            <aside class="prawy_aside" id="prawy_aside">
            <p>Dostępne wyzwania</p>
            <ul id="lista_wyzwan"></ul>

            <script>
                // Tablica ze wszystkimi wyzwaniami
                const zadania = [
                    "Zrób 10 pompek",
                    "Napisz komuś miły komentarz",
                    "Spędź godzinę bez telefonu",
                    "Przeczytaj 10 stron książki",
                    "Posprzątaj swój pokój",
                    "Wykonaj 5 minut medytacji",
                    "Narysuj coś kreatywnego",
                    "Zrób smoothie lub zdrowy napój",
                    "Wyjdź na krótki spacer",
                    "Napisz plan na jutro",
                    "Zrób 15 przysiadów",
                    "Napisz kartkę do przyjaciela",
                    "Posłuchaj ulubionej muzyki",
                    "Spróbuj nowego przepisu",
                    "Odpocznij 20 minut",
                    "Ułóż puzzle lub grę planszową",
                    "Zadzwoń do kogoś bliskiego",
                    "Zrób coś miłego dla rodziny",
                    "Zapisz 3 rzeczy, za które jesteś wdzięczny",
                    "Odwiedź miejsce, którego dawno nie widziałeś",
                    "Wykonaj krótką sesję rozciągania",
                    "Przeczytaj ciekawy artykuł",
                    "Zrób zdjęcie czegoś inspirującego",
                    "Pomóż komuś w domu lub w pracy",
                    "Ułóż plan na najbliższy weekend"
                ];
                const ul = document.getElementById("lista_wyzwan");

                // Tworzymy li dla każdego wyzwania
                for (let i = 0; i < zadania.length; i++) {
                    const li = document.createElement('li');
                    li.textContent = zadania[i];
                    ul.appendChild(li);
                }
            </script>
        </aside>
    </main>
</body>
</html>
