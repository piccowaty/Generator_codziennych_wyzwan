<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator codziennych wyzwań</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

<header>
    <h2>🎯 Generator codziennych wyzwań</h2>
</header>

<main>
    <!-- LEWY PANEL -->
    <aside class="panel">
        <div>
            <h3>Wylosowane</h3>
            <ul id="lista_wylosowane"></ul>
        </div>

        <div>
            <h3>Wykonane</h3>
            <ul id="lista_wykonane"></ul>
        </div>

        <button class="danger" onclick="wyczyscDane()">🗑 Wyczyść historię</button>
    </aside>

    <!-- ŚRODEK -->
    <section class="losowanie">
        <h3>Wylosuj wyzwanie</h3>
        <button class="glowny" onclick="losujWyzwanie()">Losuj!</button>
        <div id="wylosowane" class="wylosowane"></div>
    </section>

    <!-- PRAWY PANEL -->
    <aside class="panel">
        <h3>Dostępne wyzwania</h3>
        <ul id="lista_wyzwan"></ul>
    </aside>
</main>

<script>
const zadania = [
"Zrób 10 pompek","Napisz komuś miły komentarz","Spędź godzinę bez telefonu",
"Przeczytaj 10 stron książki","Posprzątaj swój pokój","Wykonaj 5 minut medytacji",
"Narysuj coś kreatywnego","Zrób smoothie","Wyjdź na spacer",
"Napisz plan na jutro","Zrób 15 przysiadów","Napisz kartkę do przyjaciela",
"Posłuchaj muzyki","Spróbuj nowego przepisu","Odpocznij 20 minut",
"Ułóż puzzle","Zadzwoń do bliskiej osoby","Zrób coś miłego",
"Zapisz 3 rzeczy wdzięczności","Odwiedź nowe miejsce",
"Rozciąganie","Przeczytaj artykuł","Zrób zdjęcie",
"Pomóż komuś","Zaplanuj weekend"
];

// lista zadań
const ulZadania = document.getElementById("lista_wyzwan");
zadania.forEach(z => {
    const li = document.createElement('li');
    li.textContent = z;
    ulZadania.appendChild(li);
});

// LOSOWANIE
function losujWyzwanie() {
    const box = document.getElementById('wylosowane');
    let i = 0, ostatni = 0;

    let wylosowaneTab = JSON.parse(localStorage.getItem('wylosowane')) || [];

    // filtrujemy dostępne zadania (które NIE były jeszcze wylosowane)
    let dostepne = zadania
        .map((z, index) => ({z, index}))
        .filter(el => !wylosowaneTab.includes(el.index));

    // jeśli brak dostępnych
    if (dostepne.length === 0) {
        box.textContent = "🎉 Wszystkie wyzwania zostały już wylosowane!";
        return;
    }

    function animacja() {
        if (i < 15) {
            const r = Math.floor(Math.random() * dostepne.length);
            box.textContent = dostepne[r].z;
            ostatni = dostepne[r].index;
            i++;
            setTimeout(animacja, 80);
        } else {
            box.classList.add("flash");
            setTimeout(()=>box.classList.remove("flash"),300);

            box.textContent = zadania[ostatni];
            zapisz('wylosowane', ostatni);
        }
    }

    animacja();
}

// zapis do LS
function zapisz(klucz, index){
    let tab = JSON.parse(localStorage.getItem(klucz)) || [];
    if(!tab.includes(index)){
        tab.push(index);
        localStorage.setItem(klucz, JSON.stringify(tab));
        aktualizujListe();
    }
}

// aktualizacja list
function aktualizujListe(){
    const lw = document.getElementById("lista_wylosowane");
    const lk = document.getElementById("lista_wykonane");

    lw.innerHTML = "";
    lk.innerHTML = "";

    let wyl = JSON.parse(localStorage.getItem('wylosowane')) || [];
    let wyk = JSON.parse(localStorage.getItem('wykonane')) || [];

    wyl.forEach(i=>{
        const li = document.createElement('li');
        li.innerHTML = `${zadania[i]} <button class="ok">✔</button>`;

        li.querySelector('button').onclick = ()=>{
            let wyl = JSON.parse(localStorage.getItem('wylosowane')) || [];
            let wyk = JSON.parse(localStorage.getItem('wykonane')) || [];

            wyl = wyl.filter(x=>x!==i);
            wyk.push(i);

            localStorage.setItem('wylosowane', JSON.stringify(wyl));
            localStorage.setItem('wykonane', JSON.stringify(wyk));

            aktualizujListe();
        };

        lw.appendChild(li);
    });

    wyk.forEach(i=>{
        const li = document.createElement('li');
        li.textContent = zadania[i];
        li.classList.add("done");
        lk.appendChild(li);
    });
}

// czyszczenie danych
function wyczyscDane(){
    if(confirm("Na pewno chcesz usunąć historię?")){
        localStorage.clear();
        aktualizujListe();
    }
}

aktualizujListe();
</script>

</body>
</html>
